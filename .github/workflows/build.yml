name: Build CherryDrop

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, macos-15-intel, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka requests

      - name: Install Nuitka dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y patchelf ccache xz-utils upx-ucl

      - name: Install Nuitka dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ccache

      - name: Install uv Python (macOS)
        if: runner.os == 'macOS'
        run: |
          # Nuitka 4.0.8's dylib scanner chokes on Homebrew-linked Python (bug #3777).
          # uv standalone Python has bundled OpenSSL → no Homebrew dep, no scan crash.
          pip install uv
          uv python install 3.10
          uv venv --python 3.10
          uv pip install -r requirements.txt
          uv pip install nuitka requests

          VENV_BIN="$(pwd)/.venv/bin"
          echo "VIRTUAL_ENV=$(pwd)/.venv" >> "$GITHUB_ENV"
          echo "$VENV_BIN" >> "$GITHUB_PATH"

          echo "=== uv Python check ==="
          "$VENV_BIN/python" --version

      - name: Build with Nuitka
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          if [[ "$VERSION" == v* ]]; then
            VERSION="${VERSION#v}"
          else
            VERSION="0.0.0"
          fi

          NUITKA_MODE="--mode=standalone"
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            NUITKA_MODE="--mode=app"
          fi

          # 只打包当前平台对应的 aria2 二进制
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            BIN_DIR="resources/bin/linux=resources/bin/linux"
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            BIN_DIR="resources/bin/darwin=resources/bin/darwin"
          else
            BIN_DIR="resources/bin/win64=resources/bin/win64"
          fi

          NUITKA_OPTS=""
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            NUITKA_OPTS="--assume-yes-for-downloads"
          fi

          python -m nuitka \
            $NUITKA_MODE \
            $NUITKA_OPTS \
            --enable-plugin=pyqt5 \
            --follow-imports \
            --nofollow-import-to=PyQt5.QtNetwork,PyQt5.QtWebEngine,PyQt5.QtMultimedia,PyQt5.QtMultimediaWidgets,PyQt5.QtPrintSupport,PyQt5.QtSvg,PyQt5.QtWebSockets,PyQt5.QtQuick,PyQt5.QtQuick3D,PyQt5.QtQuickWidgets,PyQt5.QtQml,PyQt5.QtQmlModels,PyQt5.QtDBus,PyQt5.QtBluetooth,PyQt5.QtNfc,PyQt5.QtSensors,PyQt5.QtPositioning,PyQt5.QtLocation,PyQt5.QtSql,PyQt5.QtXml,PyQt5.QtXmlPatterns,PyQt5.QtHelp,PyQt5.QtDesigner,PyQt5.QtUiTools,PyQt5.QtTest,PyQt5.QtSerialPort,PyQt5.QtRemoteObjects,PyQt5.QtTextToSpeech,PyQt5.QtX11Extras,PyQt5.QtOpenGL,PyQt5.QtWebChannel,PyQt5.QtConcurrent,PyQt5.QtScxml,PyQt5.QtStateMachine,PyQt5.QtCharts,PyQt5.QtDataVisualization,PyQt5.QtNetworkAuth,PyQt5.Qt3DCore,PyQt5.Qt3DRender,PyQt5.Qt3DInput,PyQt5.Qt3DLogic,PyQt5.Qt3DAnimation,PyQt5.Qt3DExtras \
            --nofollow-import-to=tkinter,unittest,pdb,test,distutils,ensurepip,venv,lib2to3,idlelib,turtle,cgi,smtplib,poplib,imaplib,ftplib,telnetlib,nntplib \
            --include-data-dir="$BIN_DIR" \
            --include-data-file=resources/aria2.conf=resources/aria2.conf \
            --include-data-dir=resources/icons=resources/icons \
            --include-data-dir=resources/themes=resources/themes \
            --output-dir=dist \
            --product-name=CherryDrop \
            --file-version="$VERSION" \
            --company-name=CherryDrop \
            main.py

      - name: Prepare artifacts (clean up Nuitka build intermediates + strip Qt fat)
        shell: bash
        run: |
          set -e
          echo "=== Before cleanup ==="
          ls -la dist/

          # 删除构建中间文件
          # 只删 onefile 构建中间件，不删 standalone 输出 (dist/*.dist 会匹配 main.dist!)
          rm -rf dist/*.onefile-build dist/*.build 2>/dev/null || true

          # ----------------------------------------------------------------
          # Qt 冗余框架清理（所有平台通用）
          # ----------------------------------------------------------------
          cleanup_qt_fat() {
            local TARGET="$1"
            local ext
            case "${{ runner.os }}" in
              Linux)   ext=".so*" ;;
              macOS)   ext="" ;;   # macOS 上是裸文件名（无后缀）/ 或 .dylib
              Windows) ext=".dll" ;;
            esac

            # QML 全家桶（Widgets 应用不需要 QML 运行时）
            for m in QtQml QtQuick QtQuick3D QtQuickWidgets QtQmlModels; do
              find "$TARGET" -maxdepth 2 -name "${m}${ext}" -exec rm -f {} + 2>/dev/null || true
              # Windows: qt5 prefix + lowercase (qt5qml.dll)
              local win_raw="${m#Qt}"; win_n="qt5$(echo "$win_raw" | tr "[:upper:]" "[:lower:]")"
              find "$TARGET" -maxdepth 2 -name "${win_n}${ext}" -exec rm -f {} + 2>/dev/null || true
              # Linux: libQt5 prefix (libQt5Multimedia.so.5)
              local lin_n="${m#Qt}"
              find "$TARGET" -maxdepth 2 -name "libQt5${lin_n}${ext}" -exec rm -f {} + 2>/dev/null || true
            done

            # 媒体/网络/数据库等无用模块
            for m in QtMultimedia QtMultimediaWidgets QtNetwork QtWebSockets \
                     QtWebChannel QtBluetooth QtNfc QtSensors QtPositioning QtLocation \
                     QtSql QtXml QtXmlPatterns QtHelp QtDesigner QtUiTools \
                     QtTest QtSerialPort QtRemoteObjects QtTextToSpeech \
                     QtX11Extras QtConcurrent QtOpenGL QtSvg QtDBus; do
              find "$TARGET" -maxdepth 2 -name "${m}${ext}" -exec rm -f {} + 2>/dev/null || true
              local win_raw="${m#Qt}"; win_n="qt5$(echo "$win_raw" | tr "[:upper:]" "[:lower:]")"
              find "$TARGET" -maxdepth 2 -name "${win_n}${ext}" -exec rm -f {} + 2>/dev/null || true
              local lin_n="${m#Qt}"
              find "$TARGET" -maxdepth 2 -name "libQt5${lin_n}${ext}" -exec rm -f {} + 2>/dev/null || true
            done

            # Qt3D 系
            for m in Qt3DCore Qt3DRender Qt3DInput Qt3DLogic Qt3DAnimation Qt3DExtras; do
              find "$TARGET" -maxdepth 2 -name "${m}${ext}" -exec rm -f {} + 2>/dev/null || true
              local win_raw="${m#Qt}"; win_n="qt5$(echo "$win_raw" | tr "[:upper:]" "[:lower:]")"
              find "$TARGET" -maxdepth 2 -name "${win_n}${ext}" -exec rm -f {} + 2>/dev/null || true
              local lin_n="${m#Qt}"
              find "$TARGET" -maxdepth 2 -name "libQt5${lin_n}${ext}" -exec rm -f {} + 2>/dev/null || true
            done

            # 其他模块
            for m in QtScxml QtStateMachine QtCharts QtDataVisualization QtNetworkAuth; do
              find "$TARGET" -maxdepth 2 -name "${m}${ext}" -exec rm -f {} + 2>/dev/null || true
              local win_raw="${m#Qt}"; win_n="qt5$(echo "$win_raw" | tr "[:upper:]" "[:lower:]")"
              find "$TARGET" -maxdepth 2 -name "${win_n}${ext}" -exec rm -f {} + 2>/dev/null || true
              local lin_n="${m#Qt}"
              find "$TARGET" -maxdepth 2 -name "libQt5${lin_n}${ext}" -exec rm -f {} + 2>/dev/null || true
            done

            # 清理无用 Qt 插件
            local PLUGIN_DIR
            PLUGIN_DIR=$(find "$TARGET" -type d -name "qt-plugins" 2>/dev/null | head -1)
            if [[ -n "$PLUGIN_DIR" ]]; then
              echo ">>> Cleaning plugins in: $PLUGIN_DIR"
              rm -rf "$PLUGIN_DIR/mediaservice" 2>/dev/null || true
              rm -rf "$PLUGIN_DIR/printsupport" 2>/dev/null || true
              # 删除 WebGL 平台插件（桌面应用不需要）
              find "$PLUGIN_DIR/platforms" -name "*webgl*" -delete 2>/dev/null || true
            fi
          }

          # ----------------------------------------------------------------
          # 平台特定的打包流程
          # ----------------------------------------------------------------
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            # 先看看 dist 结构
            echo ">>> Debug: dist/ contents:"
            ls -la dist/
            echo ">>> Debug: looking for standalone dir..."
            find dist -name "main*" -type d 2>/dev/null || echo "(no main* dirs)"
            find dist -name "*.dist" -type d 2>/dev/null || echo "(no *.dist dirs)"
            ls -la . 2>/dev/null | head -5

            # 找 standalone 输出目录
            TARGET=""
            for d in "dist/main.dist" "dist/CherryDrop.dist" "main.dist"; do
              if [[ -d "$d" ]]; then
                TARGET="$d"
                echo ">>> Found standalone dir: $TARGET"
                break
              fi
            done
            if [[ -z "$TARGET" ]]; then
              echo "ERROR: cannot find standalone output directory"
              ls -laR dist/ 2>/dev/null | head -40
              exit 1
            fi
            echo ">>> Cleaning Qt fat in: $TARGET"
            cleanup_qt_fat "$TARGET"

            echo ">>> UPX compressing binaries..."
            upx --best "$TARGET/main.bin" 2>/dev/null || true
            upx --best "$TARGET/resources/bin/linux/aria2c" 2>/dev/null || true

            echo ">>> After Qt cleanup:"
            ls -lh "$TARGET/" 2>/dev/null || true

            # 重命名目录并打包 .tar.xz
            mv "$TARGET" "dist/CherryDrop"
            echo ">>> Packaging CherryDrop.tar.xz ..."
            cd dist && tar -cJf "CherryDrop.tar.xz" "CherryDrop" && rm -rf "CherryDrop"
            cd ..
            echo ">>> Final dist/ :"
            ls -lh dist/

          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            (cd dist && APP_DIR=$(ls -d *.app 2>/dev/null | head -1) && \
             if [[ -n "$APP_DIR" ]]; then \
               find "$APP_DIR" -name '*__mypyc.*' -delete 2>/dev/null || true && \
               mv "$APP_DIR" "CherryDrop.app" && \
               APP="CherryDrop.app/Contents/MacOS" && \
               echo ">>> Cleaning Qt fat in: $APP" && \
               cleanup_qt_fat "$APP" && \
               # 只保留当前架构的 aria2 二进制
               BIN_PATH="$APP/resources/bin/darwin" && \
               if [[ "${{ runner.arch }}" == "ARM64" ]]; then \
                 echo ">>> Apple Silicon: keeping arm64 aria2" && \
                 mv "$BIN_PATH/aria2c-arm64" "$BIN_PATH/aria2c" && \
                 ZIP_NAME="CherryDrop-macOS-arm64.zip"; \
               else \
                 echo ">>> Intel: removing arm64 aria2" && \
                 rm -f "$BIN_PATH/aria2c-arm64" && \
                 ZIP_NAME="CherryDrop-macOS-x86_64.zip"; \
               fi && \
               echo ">>> Packaging $ZIP_NAME ..." && \
               zip -r "$ZIP_NAME" "CherryDrop.app" && \
               rm -rf "CherryDrop.app"; \
             fi)
            echo ">>> Final dist/ :"
            ls -lh dist/

          elif [[ "${{ runner.os }}" == "Windows" ]]; then
            TARGET="dist/main.dist"
            echo ">>> Cleaning Qt fat in: $TARGET"
            cleanup_qt_fat "$TARGET"

            echo ">>> UPX compressing binaries..."
            upx --best "$TARGET/main.exe" 2>/dev/null || true
            upx --best "$TARGET/resources/bin/win64/aria2c.exe" 2>/dev/null || true

            echo ">>> After Qt cleanup:"
            ls -lh "$TARGET/" 2>/dev/null || true

            # 创建自解压单文件 exe
            mv "$TARGET" "dist/CherryDrop"

            # SFX config: 静默解压 + 自动运行
            printf ';!@Install@!UTF-8!\nTitle="CherryDrop 樱花下载器"\nRunProgram="CherryDrop\\main.exe"\nGUIMode="2"\n;!@InstallEnd@!\n' > dist/sfx_conf.txt

            # 构建 7z 归档 + 自解压
            cd dist
            7z a -mx9 CherryDrop.7z CherryDrop >/dev/null
            rm -rf CherryDrop

            # 选择 SFX 模块: 优先 7zS.sfx (静默), 回退 7z.sfx (带进度条)
            SFX=""
            for m in "7zS.sfx" "7z.sfx"; do
              p="/c/Program Files/7-Zip/$m"
              [[ -f "$p" ]] && SFX="$p" && break
            done
            if [[ -n "$SFX" ]]; then
              echo ">>> Building SFX with: $SFX"
              cat "$SFX" sfx_conf.txt CherryDrop.7z > CherryDrop.exe
              rm -f CherryDrop.7z sfx_conf.txt
            else
              echo "WARNING: no 7z SFX module found, falling back to .zip"
              # 7z couldn't find SFX module, just keep as .7z
              mv CherryDrop.7z CherryDrop.7z
            fi
            cd ..
            echo ">>> Final dist/ :"
            ls -lh dist/
          fi

      - name: Smoke test
        shell: bash
        run: |
          set -e
          cd dist
          echo "=== 🧪 CherryDrop Smoke Test ==="
          TEST_URL="https://raw.githubusercontent.com/HDILP/cherrydrop/main/README.md"

          if [[ "${{ runner.os }}" == "Linux" ]]; then
            echo "--- Unpacking CherryDrop.tar.xz ---"
            tar -xJf "CherryDrop.tar.xz"
            cd CherryDrop

            # ── --version ──
            echo "--- Test: --version ---"
            # Linux standalone: Nuitka 产出 main.bin（不是 main）
            ./main.bin --version

            # ── xvfb GUI smoke (5s timeout → 124 = OK) ──
            echo "--- Test: xvfb GUI (5s timeout) ---"
            # 装 xvfb + Qt xcb 平台插件系统库
            sudo apt-get install -y -qq xvfb libxcb-* libxkbcommon-x11-0 2>&1 || true
            xvfb-run -a timeout 5 ./main.bin 2>&1 && rc=$? || rc=$?
            if [[ $rc -eq 124 ]]; then
              echo "✓ GUI started and ran 5s without crash"
            elif [[ $rc -eq 134 ]]; then
              echo "⚠ GUI test skipped (Qt xcb plugin crash in headless CI)"
            else
              exit $rc
            fi

            # ── Download test ──
            echo "--- Test: download ---"
            ./main.bin --download-url "$TEST_URL"

          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            ZIP=$(ls *.zip 2>/dev/null | head -1)
            if [[ -z "$ZIP" ]]; then
              echo "ERROR: no zip found in dist/"
              ls -la
              exit 1
            fi
            echo "--- Unzipping: $ZIP ---"
            unzip -q "$ZIP" -d testapp
            BUNDLE="testapp/CherryDrop.app"
            # Nuitka --mode=app 内部二进制名来自源文件名 (main.py → main)
            BINARY="$BUNDLE/Contents/MacOS/main"

            echo "--- Test: --version ---"
            "$BINARY" --version

            echo "--- Test: aria2c bundled ---"
            ARIA2_DIR="$BUNDLE/Contents/MacOS/resources/bin/darwin"
            if ls "$ARIA2_DIR"/aria2c* 1>/dev/null 2>&1; then
              file "$ARIA2_DIR"/aria2c*
              echo "✓ aria2c binary found"
            else
              echo "✗ aria2c NOT found in $ARIA2_DIR"
              find "$BUNDLE" -name "aria2c*" 2>/dev/null
              exit 1
            fi

            # ── Download test ──
            echo "--- Test: download ---"
            "$BINARY" --download-url "$TEST_URL"

            echo "--- Cleanup ---"
            rm -rf testapp

          elif [[ "${{ runner.os }}" == "Windows" ]]; then
            # SFX (.exe) 或 fallback (.7z)
            PACKAGE=$(ls CherryDrop.exe 2>/dev/null | head -1) || true
            if [[ -z "$PACKAGE" ]]; then
              echo "ERROR: no package found"
              ls -la
              exit 1
            fi
            echo "--- Unpacking: $PACKAGE ---"
            # SFX 归档内含 CherryDrop/ 前缀（由 7z a CherryDrop CherryDrop 产生的目录结构），
            # 所以直接解压到当前目录就行，不要用 -o 再套一层
            7z x -y "$PACKAGE" >/dev/null
            cd CherryDrop

            echo "--- Test: --version ---"
            ./main --version

            # ── Download test ──
            echo "--- Test: download ---"
            ./main --download-url "$TEST_URL"
          fi

          echo "=== ✅ All smoke tests passed ==="

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CherryDrop-${{ runner.os }}-${{ runner.arch }}
          path: |
            dist/*.tar.xz
            dist/*.zip
            dist/*.exe
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            RELEASE_TAG="${{ github.ref_name }}"
            RELEASE_TITLE="CherryDrop $RELEASE_TAG"
            RELEASE_ARGS=(--generate-notes)
          else
            RELEASE_TAG="build-${{ github.run_number }}"
            RELEASE_TITLE="CherryDrop Build #${{ github.run_number }}"
            RELEASE_ARGS=(--prerelease --notes "Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}")
          fi

          if ! gh release view "$RELEASE_TAG" --json id &>/dev/null; then
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              "${RELEASE_ARGS[@]}"
          fi
          # 上传每个 artifact 目录下的产物（已清理干净，每目录只有一个文件）
          for dir in artifacts/*/; do
            for file in "$dir"*; do
              [[ -f "$file" ]] && gh release upload "$RELEASE_TAG" "$file" --clobber
            done
          done
