name: Build CherryDrop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka requests

      - name: Install Nuitka dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y patchelf ccache

      - name: Install Nuitka dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ccache

      - name: Install Nuitka dependencies (Windows)
        if: runner.os == 'Windows'
        run: echo "No extra deps needed"

      - name: Build with Nuitka
        shell: bash
        run: |
          # 设置版本号
          VERSION="${{ github.ref_name }}"
          if [[ "$VERSION" == v* ]]; then
            VERSION="${VERSION#v}"
          else
            VERSION="0.0.0"
          fi

          # 各平台 Nuitka 模式
          NUITKA_MODE="--mode=onefile"
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            NUITKA_MODE="--mode=app"
          fi

          # 只打包当前平台对应的 aria2 二进制
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            BIN_DIR="resources/bin/linux=resources/bin/linux"
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            BIN_DIR="resources/bin/darwin=resources/bin/darwin"
          else
            BIN_DIR="resources/bin/win64=resources/bin/win64"
          fi

          NUITKA_OPTS=""
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            NUITKA_OPTS="--assume-yes-for-downloads"
          fi

          # 极限体积优化
          LTO_FLAG=""
          if [[ "${{ runner.os }}" != "macOS" ]]; then
            LTO_FLAG="--lto=yes"
          fi

          python -m nuitka \
            $NUITKA_MODE \
            $NUITKA_OPTS \
            $LTO_FLAG \
            --strip \
            --remove-output \
            --enable-plugin=pyqt5 \
            --noinclude-qt-plugins=sensible,styles,translations \
            --nofollow-import-to=PyQt5.QtWebEngine \
            --nofollow-import-to=PyQt5.QtMultimedia \
            --follow-imports \
            --include-data-dir="$BIN_DIR" \
            --include-data-dir=resources/aria2.conf=resources/aria2.conf \
            --include-data-dir=resources/icons=resources/icons \
            --include-data-dir=resources/themes=resources/themes \
            --nofollow-import-to=tkinter,unittest,pdb,test,distutils,ensurepip,venv,lib2to3,idlelib,turtle,cgi,smtplib,poplib,imaplib,ftplib,telnetlib,nntplib \
            --output-dir=dist \
            --product-name=CherryDrop \
            --file-version="$VERSION" \
            --company-name=CherryDrop \
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CherryDrop-${{ runner.os }}
          path: dist/*
          retention-days: 1

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          echo "Creating release for tag: $TAG"
          gh release create "$TAG" \
            --title "CherryDrop $TAG" \
            --generate-notes || true
          find artifacts -type f -exec gh release upload "$TAG" {} --clobber \;
