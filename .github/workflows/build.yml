name: Build CherryDrop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, macos-15-intel, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka requests

      - name: Install Nuitka dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y patchelf ccache

      - name: Install Nuitka dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ccache
          if [[ "${{ runner.arch }}" == "X64" ]]; then
            brew install openssl@3
          fi

      - name: Hide Homebrew dylibs from Nuitka scanner (Intel macOS)
        if: runner.os == 'macOS' && runner.arch == 'X64'
        run: |
          # Nuitka 4.0.8's dylib scanner FATALs on certain macOS dylib formats (bug #3777).
          # Workaround: remove dylibs during build so scanner can't find them,
          # then bundle them into the .app manually after build.
          OPENSSL_DIR=$(brew --prefix openssl@3)
          XZ_DIR=$(brew --prefix xz 2>/dev/null || echo "")
          mkdir -p /tmp/nuitka-dylib-bak
          for f in "$OPENSSL_DIR"/lib/libssl*.dylib "$OPENSSL_DIR"/lib/libcrypto*.dylib; do
            if [ -f "$f" ]; then
              cp -L "$f" /tmp/nuitka-dylib-bak/ && echo "Backed up: $(basename $f)" && rm -f "$f"
            fi
          done
          if [ -n "$XZ_DIR" ]; then
            for f in "$XZ_DIR"/lib/liblzma*.dylib; do
              if [ -f "$f" ]; then
                cp -L "$f" /tmp/nuitka-dylib-bak/ && echo "Backed up: $(basename $f)" && rm -f "$f"
              fi
            done
          fi
          ls -la /tmp/nuitka-dylib-bak/

      - name: Build with Nuitka
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          if [[ "$VERSION" == v* ]]; then
            VERSION="${VERSION#v}"
          else
            VERSION="0.0.0"
          fi

          NUITKA_MODE="--mode=onefile"
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            NUITKA_MODE="--mode=app"
          fi

          # 只打包当前平台对应的 aria2 二进制
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            BIN_DIR="resources/bin/linux=resources/bin/linux"
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            BIN_DIR="resources/bin/darwin=resources/bin/darwin"
          else
            BIN_DIR="resources/bin/win64=resources/bin/win64"
          fi

          NUITKA_OPTS=""
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            NUITKA_OPTS="--assume-yes-for-downloads"
          fi

          python -m nuitka \
            $NUITKA_MODE \
            $NUITKA_OPTS \
            --enable-plugin=pyqt5 \
            --follow-imports \
            --nofollow-import-to=PyQt5.QtWebEngine,PyQt5.QtMultimedia,PyQt5.QtPrintSupport,PyQt5.QtSvg,PyQt5.QtWebSockets,PyQt5.QtQuick,PyQt5.QtQml,PyQt5.QtQmlModels,PyQt5.QtDBus \
            --nofollow-import-to=tkinter,unittest,pdb,test,distutils,ensurepip,venv,lib2to3,idlelib,turtle,cgi,smtplib,poplib,imaplib,ftplib,telnetlib,nntplib \
            --include-data-dir="$BIN_DIR" \
            --include-data-file=resources/aria2.conf=resources/aria2.conf \
            --include-data-dir=resources/icons=resources/icons \
            --include-data-dir=resources/themes=resources/themes \
            --output-dir=dist \
            --product-name=CherryDrop \
            --file-version="$VERSION" \
            --company-name=CherryDrop \
            main.py

      - name: Prepare artifacts (clean up Nuitka build intermediates)
        shell: bash
        run: |
          echo "=== Before cleanup ==="
          ls -la dist/
          rm -rf dist/*.onefile-build dist/*.dist dist/*.build 2>/dev/null || true
          echo "=== After cleanup ==="
          ls -la dist/
          # 统一命名输出文件
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            mv dist/main.bin dist/CherryDrop 2>/dev/null || true
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            (cd dist && APP_DIR=$(ls -d *.app 2>/dev/null | head -1) && \
             if [[ -n "$APP_DIR" ]]; then \
               find "$APP_DIR" -name '*__mypyc.*' -delete 2>/dev/null || true && \
               mv "$APP_DIR" "CherryDrop.app" && \
               APP="CherryDrop.app/Contents/MacOS" && \
               # 清理无用 Qt 框架模块（节省 ~50MB）
               echo ">>> Cleaning up unnecessary Qt frameworks..." && \
               (cd "$APP" && \
                rm -rf QtMultimedia QtMultimediaWidgets QtPrintSupport \
                       QtSvg QtWebSockets QtQuick QtQml QtQmlModels QtDBus) && \
               # 清理无用 Qt 插件
               (cd "$APP/PyQt5/qt-plugins" && rm -rf printsupport mediaservice iconengines) && \
               # 只保留当前架构的 aria2 二进制
               BIN_PATH="$APP/resources/bin/darwin" && \
               if [[ "${{ runner.arch }}" == "ARM64" ]]; then \
                 echo ">>> Apple Silicon: keeping arm64 aria2" && \
                 mv "$BIN_PATH/aria2c-arm64" "$BIN_PATH/aria2c" && \
                 ZIP_NAME="CherryDrop-macOS-arm64.zip"; \
               else \
                 echo ">>> Intel: removing arm64 aria2" && \
                 rm -f "$BIN_PATH/aria2c-arm64" && \
                 # Intel macOS: restore dylibs hidden from Nuitka scanner + fix refs
                 if [ -d /tmp/nuitka-dylib-bak ]; then \
                   echo ">>> Bundling Homebrew dylibs (hidden from Nuitka during build)" && \
                   cp /tmp/nuitka-dylib-bak/*.dylib "$APP/" 2>/dev/null || true && \
                   echo ">>> Fixing dylib references in .so files to @executable_path..." && \
                   for SO in $(find "$APP" -name '*.so' -type f 2>/dev/null); do \
                     otool -L "$SO" 2>/dev/null | grep '/Cellar/' | awk '{print $1}' | while read -r OLD; do \
                       BN=$(basename "$OLD") && \
                       if [ -f "$APP/$BN" ]; then \
                         install_name_tool -change "$OLD" "@executable_path/$BN" "$SO" 2>/dev/null && \
                         echo "    $(basename $SO): $OLD -> @executable_path/$BN"; \
                       fi; \
                     done; \
                   done && \
                   echo ">>> Fixing dylib self-references..." && \
                   for DYLIB in "$APP"/*.dylib; do \
                     [ -f "$DYLIB" ] || continue; \
                     otool -L "$DYLIB" 2>/dev/null | grep '/Cellar/' | awk '{print $1}' | while read -r OLD; do \
                       BN=$(basename "$OLD") && \
                       install_name_tool -change "$OLD" "@executable_path/$BN" "$DYLIB" 2>/dev/null; \
                     done; \
                     # Also fix the dylib's own install name
                     BN=$(basename "$DYLIB") && \
                     install_name_tool -id "@executable_path/$BN" "$DYLIB" 2>/dev/null || true; \
                   done && \
                   echo ">>> Dylib references fixed"; \
                 fi && \
                 ZIP_NAME="CherryDrop-macOS-x86_64.zip"; \
               fi && \
               zip -r "$ZIP_NAME" "CherryDrop.app" && \
               rm -rf "CherryDrop.app"; \
             fi)
          elif [[ "${{ runner.os }}" == "Windows" ]]; then
            mv dist/main.exe dist/CherryDrop.exe 2>/dev/null || true
            mv dist/CherryDrop.exe dist/CherryDrop.exe 2>/dev/null || true
          fi
          echo "=== Final dist/ ==="
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CherryDrop-${{ runner.os }}-${{ runner.arch }}
          path: dist/*
          retention-days: 1

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          if ! gh release view "$TAG" --json id &>/dev/null; then
            gh release create "$TAG" \
              --title "CherryDrop $TAG" \
              --generate-notes
          fi
          # 上传每个 artifact 目录下的产物（已清理干净，每目录只有一个文件）
          for dir in artifacts/*/; do
            for file in "$dir"*; do
              [[ -f "$file" ]] && gh release upload "$TAG" "$file" --clobber
            done
          done
