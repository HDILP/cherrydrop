name: Build CherryDrop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka requests

      - name: Install Nuitka dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y patchelf ccache

      - name: Install Nuitka dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ccache

      - name: Build with Nuitka
        shell: bash
        run: |
          # 设置版本号
          VERSION="${{ github.ref_name }}"
          if [[ "$VERSION" == v* ]]; then
            VERSION="${VERSION#v}"
          else
            VERSION="0.0.0"
          fi

          # 各平台 Nuitka 模式
          NUITKA_MODE="--mode=onefile"
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            NUITKA_MODE="--mode=app"
          fi

          NUITKA_OPTS=""
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            NUITKA_OPTS="--assume-yes-for-downloads"
          fi

          python -m nuitka \
            $NUITKA_MODE \
            $NUITKA_OPTS \
            --enable-plugin=pyqt5 \
            --follow-imports \
            --include-data-dir=resources/bin=resources/bin \
            --include-data-dir=resources/icons=resources/icons \
            --include-data-dir=resources/themes=resources/themes \
            --output-dir=dist \
            --product-name=CherryDrop \
            --file-version="$VERSION" \
            --company-name=CherryDrop \
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CherryDrop-${{ runner.os }}
          path: dist/*
          retention-days: 1

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          echo "Creating release for tag: $TAG"
          # 先尝试创建（可能已存在则忽略错误）
          gh release create "$TAG" \
            --title "CherryDrop $TAG" \
            --generate-notes || true
          # 逐个上传 artifact，错误忽略（可能已上传）
          find artifacts -type f -exec gh release upload "$TAG" {} --clobber \;
