name: Build CherryDrop

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, macos-15-intel, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka requests

      - name: Install Nuitka dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y patchelf ccache

      - name: Install Nuitka dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ccache

      - name: Install uv Python (macOS)
        if: runner.os == 'macOS'
        run: |
          # Nuitka 4.0.8's dylib scanner chokes on Homebrew-linked Python (bug #3777).
          # uv standalone Python has bundled OpenSSL → no Homebrew dep, no scan crash.
          pip install uv
          uv python install 3.10
          uv venv --python 3.10
          uv pip install -r requirements.txt
          uv pip install nuitka requests

          VENV_BIN="$(pwd)/.venv/bin"
          echo "VIRTUAL_ENV=$(pwd)/.venv" >> "$GITHUB_ENV"
          echo "$VENV_BIN" >> "$GITHUB_PATH"

          echo "=== uv Python check ==="
          "$VENV_BIN/python" --version

      - name: Build with Nuitka
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          if [[ "$VERSION" == v* ]]; then
            VERSION="${VERSION#v}"
          else
            VERSION="0.0.0"
          fi

          NUITKA_MODE="--mode=onefile"
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            NUITKA_MODE="--mode=app"
          fi

          # 只打包当前平台对应的 aria2 二进制
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            BIN_DIR="resources/bin/linux=resources/bin/linux"
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            BIN_DIR="resources/bin/darwin=resources/bin/darwin"
          else
            BIN_DIR="resources/bin/win64=resources/bin/win64"
          fi

          NUITKA_OPTS=""
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            NUITKA_OPTS="--assume-yes-for-downloads"
          fi

          python -m nuitka \
            $NUITKA_MODE \
            $NUITKA_OPTS \
            --enable-plugin=pyqt5 \
            --follow-imports \
            --nofollow-import-to=PyQt5.QtWebEngine,PyQt5.QtMultimedia,PyQt5.QtPrintSupport,PyQt5.QtSvg,PyQt5.QtWebSockets,PyQt5.QtQuick,PyQt5.QtQml,PyQt5.QtQmlModels,PyQt5.QtDBus \
            --nofollow-import-to=tkinter,unittest,pdb,test,distutils,ensurepip,venv,lib2to3,idlelib,turtle,cgi,smtplib,poplib,imaplib,ftplib,telnetlib,nntplib \
            --include-data-dir="$BIN_DIR" \
            --include-data-file=resources/aria2.conf=resources/aria2.conf \
            --include-data-dir=resources/icons=resources/icons \
            --include-data-dir=resources/themes=resources/themes \
            --output-dir=dist \
            --product-name=CherryDrop \
            --file-version="$VERSION" \
            --company-name=CherryDrop \
            main.py

      - name: Prepare artifacts (clean up Nuitka build intermediates)
        shell: bash
        run: |
          echo "=== Before cleanup ==="
          ls -la dist/
          rm -rf dist/*.onefile-build dist/*.dist dist/*.build 2>/dev/null || true
          echo "=== After cleanup ==="
          ls -la dist/
          # 统一命名输出文件
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            mv dist/main.bin dist/CherryDrop 2>/dev/null || true
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            (cd dist && APP_DIR=$(ls -d *.app 2>/dev/null | head -1) && \
             if [[ -n "$APP_DIR" ]]; then \
               find "$APP_DIR" -name '*__mypyc.*' -delete 2>/dev/null || true && \
               mv "$APP_DIR" "CherryDrop.app" && \
               APP="CherryDrop.app/Contents/MacOS" && \
               # NOTE:
               # 不再手动删除 Qt 框架/插件。此前在 macOS Intel 产物上会触发
               # "QGuiApplicationPrivate::createPlatformIntegration()" fatal，
               # 根因是平台插件依赖被过度清理后无法加载。
               # 为稳定优先，保留 Nuitka 默认收集结果。
               # 只保留当前架构的 aria2 二进制
               BIN_PATH="$APP/resources/bin/darwin" && \
               if [[ "${{ runner.arch }}" == "ARM64" ]]; then \
                 echo ">>> Apple Silicon: keeping arm64 aria2" && \
                 mv "$BIN_PATH/aria2c-arm64" "$BIN_PATH/aria2c" && \
                 ZIP_NAME="CherryDrop-macOS-arm64.zip"; \
               else \
                 echo ">>> Intel: removing arm64 aria2" && \
                 rm -f "$BIN_PATH/aria2c-arm64" && \
                 ZIP_NAME="CherryDrop-macOS-x86_64.zip"; \
               fi && \
               zip -r "$ZIP_NAME" "CherryDrop.app" && \
               rm -rf "CherryDrop.app"; \
             fi)
          elif [[ "${{ runner.os }}" == "Windows" ]]; then
            mv dist/main.exe dist/CherryDrop.exe 2>/dev/null || true
            mv dist/CherryDrop.exe dist/CherryDrop.exe 2>/dev/null || true
          fi
          echo "=== Final dist/ ==="
          ls -la dist/

      - name: Smoke test
        shell: bash
        run: |
          set -e
          cd dist
          echo "=== 🧪 CherryDrop Smoke Test ==="
          TEST_URL="https://raw.githubusercontent.com/HDILP/cherrydrop/main/README.md"

          if [[ "${{ runner.os }}" == "Linux" ]]; then
            # ── --version ──
            echo "--- Test: --version ---"
            ./CherryDrop --version

            # ── xvfb GUI smoke (5s timeout → 124 = OK) ──
            echo "--- Test: xvfb GUI (5s timeout) ---"
            sudo apt-get install -y -qq xvfb
            xvfb-run -a timeout 5 ./CherryDrop 2>&1 && rc=$? || rc=$?
            if [[ $rc -eq 124 ]]; then
              echo "✓ GUI started and ran 5s without crash"
            else
              exit $rc
            fi

            # ── Download test ──
            echo "--- Test: download ---"
            ./CherryDrop --download-url "$TEST_URL"

          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            ZIP=$(ls *.zip 2>/dev/null | head -1)
            if [[ -z "$ZIP" ]]; then
              echo "ERROR: no zip found in dist/"
              ls -la
              exit 1
            fi
            echo "--- Unzipping: $ZIP ---"
            unzip -q "$ZIP" -d testapp
            BUNDLE="testapp/CherryDrop.app"
            BINARY="$BUNDLE/Contents/MacOS/CherryDrop"

            echo "--- Test: --version ---"
            "$BINARY" --version

            echo "--- Test: aria2c bundled ---"
            ARIA2_DIR="$BUNDLE/Contents/MacOS/resources/bin/darwin"
            if ls "$ARIA2_DIR"/aria2c* 1>/dev/null 2>&1; then
              file "$ARIA2_DIR"/aria2c*
              echo "✓ aria2c binary found"
            else
              echo "✗ aria2c NOT found in $ARIA2_DIR"
              find "$BUNDLE" -name "aria2c*" 2>/dev/null
              exit 1
            fi

            # ── Download test ──
            echo "--- Test: download ---"
            "$BINARY" --download-url "$TEST_URL"

            echo "--- Cleanup ---"
            rm -rf testapp

          elif [[ "${{ runner.os }}" == "Windows" ]]; then
            echo "--- Test: --version ---"
            ./CherryDrop.exe --version

            # ── Download test ──
            echo "--- Test: download ---"
            ./CherryDrop.exe --download-url "$TEST_URL"
          fi

          echo "=== ✅ All smoke tests passed ==="

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CherryDrop-${{ runner.os }}-${{ runner.arch }}
          path: dist/*
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            RELEASE_TAG="${{ github.ref_name }}"
            RELEASE_TITLE="CherryDrop $RELEASE_TAG"
            RELEASE_ARGS=(--generate-notes)
          else
            RELEASE_TAG="build-${{ github.run_number }}"
            RELEASE_TITLE="CherryDrop Build #${{ github.run_number }}"
            RELEASE_ARGS=(--prerelease --notes "Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}")
          fi

          if ! gh release view "$RELEASE_TAG" --json id &>/dev/null; then
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              "${RELEASE_ARGS[@]}"
          fi
          # 上传每个 artifact 目录下的产物（已清理干净，每目录只有一个文件）
          for dir in artifacts/*/; do
            for file in "$dir"*; do
              [[ -f "$file" ]] && gh release upload "$RELEASE_TAG" "$file" --clobber
            done
          done
