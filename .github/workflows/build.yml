name: Build CherryDrop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka requests

      - name: Install Nuitka dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y patchelf ccache

      - name: Install Nuitka dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ccache

      - name: Build with Nuitka
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          if [[ "$VERSION" == v* ]]; then
            VERSION="${VERSION#v}"
          else
            VERSION="0.0.0"
          fi

          NUITKA_MODE="--mode=onefile"
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            NUITKA_MODE="--mode=app"
          fi

          # 只打包当前平台对应的 aria2 二进制
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            BIN_DIR="resources/bin/linux=resources/bin/linux"
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            BIN_DIR="resources/bin/darwin=resources/bin/darwin"
          else
            BIN_DIR="resources/bin/win64=resources/bin/win64"
          fi

          NUITKA_OPTS=""
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            NUITKA_OPTS="--assume-yes-for-downloads"
          fi

          python -m nuitka \
            $NUITKA_MODE \
            $NUITKA_OPTS \
            --enable-plugin=pyqt5 \
            --follow-imports \
            --nofollow-import-to=PyQt5.QtWebEngine \
            --nofollow-import-to=PyQt5.QtMultimedia \
            --nofollow-import-to=tkinter,unittest,pdb,test,distutils,ensurepip,venv,lib2to3,idlelib,turtle,cgi,smtplib,poplib,imaplib,ftplib,telnetlib,nntplib \
            --include-data-dir="$BIN_DIR" \
            --include-data-file=resources/aria2.conf=resources/aria2.conf \
            --include-data-dir=resources/icons=resources/icons \
            --include-data-dir=resources/themes=resources/themes \
            --output-dir=dist \
            --product-name=CherryDrop \
            --file-version="$VERSION" \
            --company-name=CherryDrop \
            main.py

      - name: Prepare artifacts (clean up Nuitka build intermediates)
        shell: bash
        run: |
          echo "=== Before cleanup ==="
          ls -la dist/
          rm -rf dist/*.onefile-build dist/*.dist dist/*.build 2>/dev/null || true
          echo "=== After cleanup ==="
          ls -la dist/
          # 统一命名输出文件
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            mv dist/main.bin dist/CherryDrop 2>/dev/null || true
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            (cd dist && APP_DIR=$(ls -d *.app 2>/dev/null | head -1) && \
             if [[ -n "$APP_DIR" ]]; then \
               find "$APP_DIR" -name '*__mypyc.*' -delete 2>/dev/null || true && \
               mv "$APP_DIR" "CherryDrop.app" && \
               zip -r "CherryDrop-macOS.zip" "CherryDrop.app" && \
               rm -rf "CherryDrop.app"; \
             fi)
          elif [[ "${{ runner.os }}" == "Windows" ]]; then
            mv dist/main.exe dist/CherryDrop.exe 2>/dev/null || true
            mv dist/CherryDrop.exe dist/CherryDrop.exe 2>/dev/null || true
          fi
          echo "=== Final dist/ ==="
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CherryDrop-${{ runner.os }}
          path: dist/*
          retention-days: 1

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          if ! gh release view "$TAG" --json id &>/dev/null; then
            gh release create "$TAG" \
              --title "CherryDrop $TAG" \
              --generate-notes
          fi
          # 上传每个 artifact 目录下的产物（已清理干净，每目录只有一个文件）
          for dir in artifacts/*/; do
            for file in "$dir"*; do
              [[ -f "$file" ]] && gh release upload "$TAG" "$file" --clobber
            done
          done
